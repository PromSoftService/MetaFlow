repo_url: "https://github.com/PromSoftService/MetaPlatform.git"
branch: "main"
repo_dir: "./projects/MetaPlatform/repo"
artifacts_dir: "./projects/MetaPlatform/artifacts"

attachments_dir: "./projects/MetaPlatform/attachments"
reviewer_inbox_dir: "./projects/MetaPlatform/inbox"

reviewer_model: "gpt-5.4"
max_iterations: 5

repo_retry_count: 0
setup_retry_count: 0
codex_retry_count: 0
reviewer_retry_count: 0

repo_retry_sleep_sec: 10
setup_retry_sleep_sec: 10
codex_retry_sleep_sec: 10
reviewer_retry_sleep_sec: 10

iteration_sleep_sec: 8
codex_heartbeat_interval_sec: 15

codex_command: "codex exec --json -"

setup_commands:
  - "cd ./ui && npm install"
  - "python -m pip install -r ./rtb/requirements.txt"

all_test_commands:
  - "cd ./ui && npm.cmd test"
  - "cd ./ui && npm.cmd run test:integration"
  - "cd ./ui && npm.cmd run test:backend"

codex_max_runtime_sec: 1800
codex_post_turn_grace_sec: 15
codex_idle_timeout_sec: 600
codex_terminate_wait_sec: 5
