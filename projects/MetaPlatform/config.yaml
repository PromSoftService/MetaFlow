# HOW TO USE
# 1) Adjust repo_url, branch and full test commands
# 2) Create folders manually near run.py:
#    - ./attachments
#    - ./inbox
# 3) Put first-iteration reference files into ./attachments
# 4) Then run:
#    py run.py --task task.md --instructions instructions.md --config config.yaml

repo_url: "https://github.com/PromSoftService/MetaPlatform.git"
branch: "main"
repo_dir: "./projects/MetaPlatform/repo"
artifacts_dir: "./projects/MetaPlatform/artifacts"

# Эти папки пользователь создаёт сам рядом с run.py.
# run.py не создаёт их, только читает содержимое.
attachments_dir: "./projects/MetaPlatform/attachments"
reviewer_inbox_dir: "./projects/MetaPlatform/inbox"

reviewer_model: "gpt-5.4"
max_iterations: 4

# 0 или -1 = бесконечные ретраи
repo_retry_count: 0
setup_retry_count: 0
codex_retry_count: 0
reviewer_retry_count: 0

# Фиксированная пауза между любыми повторными попытками.
# Без backoff, без 5/10/20/60 — всегда строго это значение.
repo_retry_sleep_sec: 10
setup_retry_sleep_sec: 10
codex_retry_sleep_sec: 10
reviewer_retry_sleep_sec: 10

iteration_sleep_sec: 8
codex_heartbeat_interval_sec: 15

# run.py сам добавит --output-schema и -o, если их нет.
codex_command: "codex exec --dangerously-bypass-approvals-and-sandbox --json -"

setup_commands:
  - "cd ./ui && npm install"
  - "python -m pip install -r ./runtime_backend/requirements.txt"

all_test_commands:
  - "cd ./ui && npm test"
  - "cd ./ui && npm run test:integration"
  - "python -m pytest runtime_backend/tests -q"
  - "python create_project_structure.py"
  - "python export_project_to_txt.py"

codex_max_runtime_sec: 1800
codex_post_turn_grace_sec: 15
codex_idle_timeout_sec: 600
codex_terminate_wait_sec: 5